  <style>
    html {
      background: #444;
      font-family: sans-serif;
    }

    body, html {
      overscroll-behavior: none;
    }

    #canvas, #overlayDiv {
      position: absolute;
      top: 0px;
      left: 0px;

      width: 100%;
      height: 100%;

      border: 0 none;
    }

    #canvas {
      background: #000;
    }

    .visible {
      visibility: visible;
      opacity: 1.0;
      transition: opacity .1s linear;
    }

    .hidden {
      visibility: hidden;
      opacity: 0;
      transition: visibility 0s .25s, opacity .25s linear;
    }

    #statusDiv, #inputDiv {
      background: rgba(0, 0, 0, 0.75);
      width: 50%;
      margin: auto;
      min-width: 340px;
      padding: 10px;

      position: absolute;
      top: 0;
      left: 0;
      right: 0;

      border-radius: 0 0 5px 5px;
    }

    #statusTextDiv {
      overflow: auto;
      max-height: 40vh;
      color: #ccc;
      font-size: 14px;
    }

    #statusProgress {
      display: none;
      width: 100%;
    }

    #inputDiv {
      width: 65%;
      padding-left: 10px;
      padding-right: 20px;
    }

    #inputPrompt {
      color: #eee;
      font-size: 150%;
      margin-bottom: 1em;
      margin-top: 1em;

    }

    #inputText {
      width: 100%;
      font-size: 175%;
      padding: 5px;
      background: inherit;
      color: #eee;
    }

    #inputText:focus {
      color: #ffffff;
    }

    #ContextContainer {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      color: white;
      z-index: 2147483647;
      pointer-events: none;
    }

    #ContextContainer.shown {
      background: rgba(0, 0, 0, 0.5);
      border-radius: 5px;
      padding: 5px;
      pointer-events: auto;
    }

    #ContextButton {
      display: none;
    }

    #ContextMenu {
      max-height: calc(100vh - 40px);
      overflow-y: auto;
    }

    #ContextMenu a {
      text-decoration: none;
      color: lightgrey;
      background: #444;
      height: 48px;
      width: 250px;
      border-radius: 5px;
      border: 1px solid lightgrey;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 5px 5px;
      opacity: 1.0;
    }

    #ContextMenu a:hover {
      text-decoration: none;
      background: #666666;
      color: #ffffff
    }

    #ContextMenu a:focus {
      outline: none;
      text-decoration: none;
      background: #666666;
      color: #ffffff;
      box-shadow: 0 0 0 3px #ffffff;
    }

    #presplash {
        position: absolute;
        top: 0;
        left: 0;
        display: block;
        margin: auto;
        width: 100%;
        height: 100%;
        object-fit: contain;
    }

  </style>

  <script>
    (function () {
        var storageKey = "ddlc4tizen.characters.v1";
        var names = ["monika", "natsuki", "sayori", "yuri"];
        var memoryState = null;

        function normalize(name) {
            name = String(name || "").toLowerCase();

            if (names.indexOf(name) === -1) {
                throw new Error("Unknown character: " + name);
            }

            return name;
        }

        function blankState() {
            var state = {};

            names.forEach(function (name) {
                state[name] = "present";
            });

            return state;
        }

        function getItem() {
            try {
                return window.localStorage.getItem(storageKey);
            } catch (error) {
                return null;
            }
        }

        function setItem(value) {
            try {
                window.localStorage.setItem(storageKey, value);
                return true;
            } catch (error) {
                memoryState = JSON.parse(value);
                return false;
            }
        }

        function load() {
            var state = memoryState || {};
            var raw = getItem();

            if (raw) {
                try {
                    state = JSON.parse(raw) || {};
                } catch (error) {
                    state = {};
                }
            }

            names.forEach(function (name) {
                if (state[name] !== "deleted") {
                    state[name] = "present";
                }
            });

            return state;
        }

        function save(state) {
            memoryState = state;
            setItem(JSON.stringify(state));

            if (window.CustomEvent) {
                window.dispatchEvent(new CustomEvent("ddlc4tizen-character-state-change", {
                    detail: state
                }));
            }
        }

        function setState(name, value) {
            var state = load();
            state[normalize(name)] = value;
            save(state);
            return 1;
        }

        function restoreAll() {
            save(blankState());
            return 1;
        }

        function deleteAll() {
            var state = {};

            names.forEach(function (name) {
                state[name] = "deleted";
            });

            save(state);
            return 1;
        }

        window.DDLC4TizenCharacters = {
            state: function (name) {
                return load()[normalize(name)];
            },
            exists: function (name) {
                return load()[normalize(name)] === "present" ? 1 : 0;
            },
            create: function (name) {
                return setState(name, "present");
            },
            "delete": function (name) {
                return setState(name, "deleted");
            },
            remove: function (name) {
                return setState(name, "deleted");
            },
            restoreAll: restoreAll,
            deleteAll: deleteAll,
            all: function () {
                return JSON.stringify(load());
            }
        };

        function titleCase(name) {
            return name.charAt(0).toUpperCase() + name.slice(1);
        }

        function installMenu() {
            if (document.getElementById("ddlc4tizen-character-menu-start")) {
                return;
            }

            var menu = document.getElementById("ContextMenu");

            if (!menu) {
                return;
            }

            function makeMenuItem(text, callback) {
                var item = document.createElement("a");
                item.href = "#";
                item.appendChild(document.createTextNode(text));
                item.addEventListener("click", function (event) {
                    event.preventDefault();
                    callback();
                    updateMenu();
                });
                return item;
            }

            function appendMenuItem(text, callback) {
                var item = makeMenuItem(text, callback);
                menu.appendChild(item);
                return item;
            }

            var marker = document.createElement("span");
            marker.id = "ddlc4tizen-character-menu-start";
            marker.style.display = "none";
            menu.appendChild(marker);
            var characterItems = {};

            names.forEach(function (name) {
                var characterName = titleCase(name);

                characterItems[name] = {
                    "delete": appendMenuItem("Delete " + characterName, function () {
                        window.DDLC4TizenCharacters["delete"](name);
                    }),
                    restore: appendMenuItem("Restore " + characterName, function () {
                        window.DDLC4TizenCharacters.create(name);
                    })
                };
            });

            appendMenuItem("Delete All Characters", function () {
                window.DDLC4TizenCharacters.deleteAll();
            });
            appendMenuItem("Restore All Characters", function () {
                window.DDLC4TizenCharacters.restoreAll();
            });

            function updateMenu() {
                names.forEach(function (name) {
                    var state = window.DDLC4TizenCharacters.state(name);
                    var characterName = titleCase(name);
                    characterItems[name]["delete"].textContent = "Delete " + characterName + " (" + state + ")";
                    characterItems[name].restore.textContent = "Restore " + characterName + " (" + state + ")";
                });
            }

            window.addEventListener("ddlc4tizen-character-state-change", updateMenu);
            updateMenu();
        }

        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", installMenu);
        } else {
            installMenu();
        }
    }());
  </script>

</head>

<body>
  <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex=-1></canvas>
  <div id="overlayDiv"></div>

  <img id="presplash" src="web-presplash.jpg">

  <div id="ContextContainer">
    <a id="ContextButton" aria-label="Open menu"></a><br />
    <div id="ContextMenu" style="display: none;">
      <input id="ID_SavegamesImport" type="file" onchange="onSavegamesImport(this)" accept="application/zip"
        style=display:none></input>
      <a href="javascript:document.getElementById('ID_SavegamesImport').click();">Import Saves</a>
      <a href="javascript:onSavegamesExport();">Export Saves</a>
      <a href="javascript:FSDownload('/log.txt', 'text/plain');">Download Log</a>
      <a href="https://www.renpy.org/" target="_blank">
          Powered by Ren'Py
      </a>
      </span>
    </div>
  </div>

  <div id="statusDiv" class="hidden">
    <div id="statusTextDiv"></div>
    <progress id="statusProgress" value="0" max="100"></progress>
  </div>

  <div id="inputDiv" class="hidden">
    <form id="inputForm">
      <div id="inputPrompt"></div>
      <input id="inputText" type="text">
    </form>
  </div>

  <script>
      // Disable service worker APIs for this app for now.
      (function () {
          var noopPromise = Promise.resolve();
          var noopRegistration = {
              active: null,
              installing: null,
              waiting: null,
              scope: location.href,
              update: function () { return noopPromise; },
              unregister: function () { return Promise.resolve(false); },
              addEventListener: function () { },
              removeEventListener: function () { },
              dispatchEvent: function () { return false; }
          };
          var noopServiceWorker = {
              controller: null,
              ready: Promise.resolve(noopRegistration),
              register: function () { return Promise.resolve(noopRegistration); },
              getRegistration: function () { return Promise.resolve(undefined); },
              getRegistrations: function () { return Promise.resolve([]); },
              startMessages: function () { },
              addEventListener: function () { },
              removeEventListener: function () { },
              dispatchEvent: function () { return false; }
          };

          try {
              Object.defineProperty(navigator, "serviceWorker", {
                  configurable: true,
                  value: noopServiceWorker
              });
          } catch (e) {
              try {
                  Object.defineProperty(Navigator.prototype, "serviceWorker", {
                      configurable: true,
                      get: function () { return noopServiceWorker; }
                  });
              } catch (e) {
                  console.warn("Could not disable service worker APIs:", e);
              }
          }
      })();

      // The URL to game.zip, relative to the URL of this file.
      window.gameZipURL = 'game.zip';

      // Register the service worker.
      if (navigator.serviceWorker) {
          if (!navigator.serviceWorker.controller) {
              navigator.serviceWorker.register('./service-worker.js', { updateViaCache: 'all' });
          }
      }
  </script>
  <script src="renpy-pre.js"></script>
  <script async type="text/javascript" src="renpy.js"></script>
</body>
